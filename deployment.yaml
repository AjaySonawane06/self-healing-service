apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfheal-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: selfheal-app
  template:
    metadata:
      labels:
        app: selfheal-app
    spec:
      containers:
        - name: selfheal-app
          image: ajaysonawane06/selfheal-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: selfheal-service
spec:
  selector:
    app: selfheal-app
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort